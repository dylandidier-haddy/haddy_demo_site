<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F0EEE9">
<meta name="robots" content="noindex">
<title>Haddy · Access</title>
<style>
  :root {
    --paper: #F0EEE9; --paper-3: #FFFDF6; --ink: #1F1915;
    --ink-55: rgba(31,25,21,.55); --ink-12: rgba(31,25,21,.12);
    --accent: #F3763B; --red: #FA4149;
    --font: 'LT Superior', 'Helvetica Neue', 'Segoe UI', Helvetica, Arial, sans-serif;
    --safe-t: env(safe-area-inset-top, 0px); --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    display: grid; place-items: center; padding: calc(24px + var(--safe-t)) 22px calc(24px + var(--safe-b));
    background-image: radial-gradient(120% 80% at 50% -10%, rgba(243,118,59,.10), transparent 60%);
  }
  .card { width: 100%; max-width: 380px; text-align: left; }
  .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 40px; }
  .brand svg { width: 26px; height: 26px; }
  .brand b { font-weight: 600; letter-spacing: .3em; font-size: 15px; padding-left: 2px; }
  .eyebrow { font-size: .68rem; letter-spacing: .22em; text-transform: uppercase; color: var(--ink-55); margin: 0 0 14px; }
  h1 { font-weight: 500; letter-spacing: -.02em; line-height: 1.05; margin: 0 0 26px; font-size: clamp(1.9rem, 7vw, 2.6rem); }
  label { display: block; font-size: .68rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-55); margin-bottom: 9px; }
  input[type=password] {
    width: 100%; font: inherit; font-size: 1.05rem; color: var(--ink);
    background: var(--paper-3); border: 1px solid var(--ink-12); border-radius: 10px;
    padding: 15px 16px; outline: none; transition: border-color .15s ease, box-shadow .15s ease;
  }
  input[type=password]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(243,118,59,.16); }
  button {
    margin-top: 16px; width: 100%; font: inherit; font-weight: 500; font-size: .82rem;
    letter-spacing: .14em; text-transform: uppercase; cursor: pointer;
    background: var(--ink); color: var(--paper-3); border: 1px solid var(--ink);
    border-radius: 999px; padding: 16px; display: inline-flex; align-items: center;
    justify-content: center; gap: 10px; transition: background .18s ease, color .18s ease;
  }
  button:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }
  button:active { transform: scale(.98); }
  .err { color: var(--red); font-size: .9rem; margin: 16px 0 0; min-height: 1.2em; }
  .foot { margin-top: 40px; display: flex; align-items: center; gap: 10px; color: var(--ink-55); font-size: .64rem; letter-spacing: .2em; text-transform: uppercase; }
  .foot .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
</style>
</head>
<body>
  <main class="card">
    <div class="brand" aria-hidden="true">
      <svg viewBox="0 0 28 28">
        <rect x="1.4" y="1.4" width="25.2" height="25.2" rx="4" fill="none" stroke="currentColor" stroke-width="1.7"/>
        <path d="M7.5 20.5 L14 8 L20.5 20.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
      </svg>
      <b>HADDY</b>
    </div>

    <p class="eyebrow">Private demo</p>
    <h1>Enter the access&nbsp;code</h1>

    <form id="form" method="post" action="/api/login" novalidate>
      <input type="hidden" name="next" id="next" value="/">
      <label for="pw">Access code</label>
      <input id="pw" name="password" type="password" autocomplete="current-password"
             autocapitalize="off" autocorrect="off" spellcheck="false" required aria-describedby="err">
      <button type="submit">View demo <span aria-hidden="true">→</span></button>
      <p class="err" id="err" role="alert"></p>
    </form>

    <div class="foot"><span class="dot"></span> Made here : USA</div>
  </main>

<script>
  (function () {
    var qs = new URLSearchParams(location.search);
    var next = qs.get('next') || '/';
    // Only allow a same-origin path — never an off-site or protocol-relative URL.
    if (!/^\/(?!\/)/.test(next)) next = '/';
    document.getElementById('next').value = next;

    var errEl = document.getElementById('err');
    var pw = document.getElementById('pw');
    if (qs.get('e')) {
      errEl.textContent = qs.get('e') === 'config'
        ? 'This demo isn’t configured yet (missing DEMO_PASSWORD).'
        : 'Incorrect code. Try again.';
    }

    // Enhance the plain form POST with a fetch so a wrong code doesn't reload
    // the page. Without JS, the native form still posts and works.
    document.getElementById('form').addEventListener('submit', function (e) {
      e.preventDefault();
      errEl.textContent = '';
      fetch('/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ password: pw.value, next: next })
      }).then(function (r) { return r.json().catch(function () { return {}; }); })
        .then(function (data) {
          if (data && data.ok) { location.replace(data.redirect || '/'); }
          else { errEl.textContent = (data && data.error) || 'Incorrect code. Try again.'; pw.value = ''; pw.focus(); }
        })
        .catch(function () { errEl.textContent = 'Network error. Try again.'; });
    });
  })();
</script>
</body>
</html>
