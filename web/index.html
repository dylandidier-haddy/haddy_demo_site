<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="Interactive slice demo — see exactly how this piece was printed.">
<title>Haddy · Demo</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: rgba(16, 22, 30, 0.82);
    --line: rgba(255, 255, 255, 0.10);
    --fg: #e8eef6;
    --dim: #8797ab;
    --accent: #F3763B;   /* Haddy orange */
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--fg);
    font: 15px/1.4 ui-sans-serif, -apple-system, "SF Pro Text", system-ui, sans-serif;
    overscroll-behavior: none; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }
  #vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 35%, transparent 40%, rgba(0,0,0,.55) 100%);
  }

  /* ---- header ---- */
  #head {
    position: fixed; left: 0; right: 0; top: 0; padding: calc(14px + var(--safe-t)) 16px 14px;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(11,15,20,.9), transparent);
  }
  #brand { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; color: var(--fg); }
  #brand svg { width: 21px; height: 21px; display: block; }
  #brand b { font-weight: 600; letter-spacing: .26em; font-size: 12.5px; padding-left: 1px; }
  #title { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
  #subtitle { font-size: 13px; color: var(--dim); margin-top: 2px; }

  /* ---- next-demo control (shown only when the manifest has >1 demo) ---- */
  #nextDemo {
    position: fixed; top: calc(12px + var(--safe-t)); left: 50%; transform: translateX(-50%);
    z-index: 8; display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel); color: var(--fg);
    backdrop-filter: blur(12px); font: inherit; font-size: 13px; font-weight: 600;
  }
  #nextDemo:active { transform: translateX(-50%) scale(.96); }
  #nextDemo .arr { color: var(--accent); }
  #nextDemo.hidden { display: none; }

  /* ---- top-right buttons ---- */
  #tools {
    position: fixed; top: calc(12px + var(--safe-t)); right: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .icon {
    width: 44px; height: 44px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--panel);
    color: var(--fg); backdrop-filter: blur(12px);
    display: grid; place-items: center; cursor: pointer;
    font-size: 17px; line-height: 1;
  }
  .icon[aria-pressed="false"] { color: var(--dim); }
  .icon:active { transform: scale(.94); }

  /* ---- track chips ---- */
  #tracks {
    position: fixed; left: 12px; top: calc(74px + var(--safe-t));
    display: flex; gap: 6px; flex-wrap: wrap; max-width: 60vw;
  }
  .chip {
    padding: 7px 12px; min-height: 34px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--panel);
    color: var(--dim); font-size: 12.5px; cursor: pointer; backdrop-filter: blur(12px);
  }
  .chip[aria-selected="true"] { color: #04141a; background: var(--accent); border-color: transparent; font-weight: 600; }

  /* ---- bottom control bar ---- */
  #bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 14px 16px calc(16px + var(--safe-b));
    background: linear-gradient(0deg, rgba(11,15,20,.96) 55%, transparent);
  }
  #readout {
    display: flex; justify-content: space-between; align-items: baseline;
    font-variant-numeric: tabular-nums; margin-bottom: 8px;
  }
  #layerNo { font-size: 20px; font-weight: 600; }
  #layerNo small { font-size: 13px; color: var(--dim); font-weight: 400; }
  #zTxt { font-size: 13px; color: var(--dim); }

  #row { display: flex; align-items: center; gap: 12px; }

  #play {
    flex: 0 0 auto; width: 52px; height: 52px; border-radius: 50%;
    border: none; background: var(--accent); color: #04141a;
    font-size: 20px; display: grid; place-items: center; cursor: pointer;
  }
  #play:active { transform: scale(.94); }

  /* A deliberately oversized slider: this gets used by strangers, one-handed,
     often with a phone in the other hand. 44px is the floor for a touch target. */
  #scrub {
    flex: 1 1 auto; -webkit-appearance: none; appearance: none;
    height: 44px; background: transparent; cursor: pointer; margin: 0;
  }
  #scrub::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent) var(--pct, 0%), rgba(255,255,255,.14) var(--pct, 0%));
  }
  #scrub::-moz-range-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,.14); }
  #scrub::-moz-range-progress { height: 6px; border-radius: 3px; background: var(--accent); }
  #scrub::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 26px; height: 26px; border-radius: 50%; margin-top: -10px;
    background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.5);
  }
  #scrub::-moz-range-thumb {
    width: 26px; height: 26px; border: none; border-radius: 50%;
    background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.5);
  }

  /* ---- overlays ---- */
  #veil {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--bg); z-index: 20; text-align: center; padding: 24px;
    transition: opacity .45s ease;
  }
  #veil.gone { opacity: 0; pointer-events: none; }
  #ring { width: 46px; height: 46px; margin: 0 auto 16px;
    border: 3px solid rgba(255,255,255,.14); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 900ms linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #veilTxt { color: var(--dim); font-size: 14px; font-variant-numeric: tabular-nums; }
  #veil.error #ring { display: none; }
  #veil.error #veilTxt { color: #fca5a5; max-width: 34ch; }

  #hint {
    position: fixed; left: 50%; bottom: calc(120px + var(--safe-b));
    transform: translateX(-50%); pointer-events: none;
    font-size: 12.5px; color: var(--dim);
    background: var(--panel); border: 1px solid var(--line);
    padding: 7px 14px; border-radius: 999px; backdrop-filter: blur(12px);
    transition: opacity .5s ease; white-space: nowrap;
  }
  #hint.gone { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    #ring { animation: none; }
  }

  /* ---- lightweight access gate (client-side; type the code to view) ---- */
  #gate {
    position: fixed; inset: 0; z-index: 30; display: grid; place-items: center;
    background: var(--bg); padding: 24px;
  }
  #gate.hidden { display: none; }
  #gateForm { width: 100%; max-width: 320px; }
  .gate-brand { display: flex; align-items: center; gap: 9px; color: var(--fg); margin-bottom: 34px; }
  .gate-brand svg { width: 24px; height: 24px; }
  .gate-brand b { font-weight: 600; letter-spacing: .28em; font-size: 14px; padding-left: 1px; }
  .gate-eyebrow { font-size: .66rem; letter-spacing: .22em; text-transform: uppercase; color: var(--dim); margin: 0 0 20px; }
  #gate label { display: block; font-size: .66rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 9px; }
  #gateInput {
    width: 100%; font: inherit; font-size: 16px; color: var(--fg);
    background: rgba(255,255,255,.04); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 15px; outline: none; transition: border-color .15s ease, box-shadow .15s ease;
  }
  #gateInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(243,118,59,.20); }
  #gate button {
    margin-top: 14px; width: 100%; font: inherit; font-weight: 600; font-size: 13px;
    letter-spacing: .1em; text-transform: uppercase; cursor: pointer; color: #04141a;
    background: var(--accent); border: none; border-radius: 999px; padding: 15px;
  }
  #gate button:active { transform: scale(.98); }
  .gate-err { color: #fca5a5; font-size: 13px; min-height: 1.2em; margin: 14px 0 0; }
</style>
</head>
<body>

<!--
  three.js r184 is vendored into web/vendor/ rather than pulled from a CDN.
  Gallery wifi blocks things, captive portals intercept things, and a CDN
  outage during a show is unfixable from the floor. Self-hosting makes the
  whole exhibit one directory with no external runtime dependency.

  To use the CDN instead, swap the two "imports" values for:
    "three":         "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
-->
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.min.js",
    "three/addons/controls/OrbitControls.js": "./vendor/OrbitControls.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import {
  parseTpath, parseGcodeText, buildTrackBuffers, drawRangesFor
} from './viewer-core.js?v=2';

// ===========================================================================
// 1. Fetch with progress, transparent gzip
// ===========================================================================

async function fetchWithProgress(url, onProgress) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText} — ${url}`);

  const total = +res.headers.get('content-length') || 0;
  if (!res.body || !total) return await res.arrayBuffer();

  const reader = res.body.getReader();
  const chunks = [];
  let seen = 0;
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    seen += value.byteLength;
    onProgress(seen / total);
  }
  const out = new Uint8Array(seen);
  let o = 0;
  for (const c of chunks) { out.set(c, o); o += c.byteLength; }
  return out.buffer;
}

/**
 * Inflate if the bytes are actually gzip, decided by the 1f 8b magic rather
 * than by Content-Encoding. Hosts differ on whether they set that header for
 * an unknown extension, and browsers differ on whether they strip it after
 * decoding — so a header check can double-inflate or skip inflating. The
 * bytes cannot lie.
 */
async function maybeGunzip(buf) {
  const head = new Uint8Array(buf, 0, Math.min(2, buf.byteLength));
  if (head.length < 2 || head[0] !== 0x1f || head[1] !== 0x8b) return buf;
  if (typeof DecompressionStream === 'undefined') {
    throw new Error('This browser cannot decompress the toolpath file.');
  }
  const stream = new Blob([buf]).stream().pipeThrough(new DecompressionStream('gzip'));
  return await new Response(stream).arrayBuffer();
}

/** Prefer the pre-gzipped sibling; fall back to the plain file. */
async function loadTrack(url, onProgress) {
  const isTpath = /\.tpath(\.gz)?$/.test(url);

  if (isTpath && !/\.gz$/.test(url)) {
    try {
      return parseTpath(await maybeGunzip(await fetchWithProgress(url + '.gz', onProgress)));
    } catch (_) {
      /* no .gz sibling, or it failed — fall through to the plain file */
    }
  }

  const buf = await maybeGunzip(await fetchWithProgress(url, onProgress));
  if (isTpath) return parseTpath(buf);
  return parseGcodeText(new TextDecoder().decode(buf));
}

// ===========================================================================
// 2. Scene
// ===========================================================================

const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
// Capping DPR at 2 is the single biggest perf lever on phones; a 3x iPhone
// renders 2.25x the pixels for a difference nobody can see on 1px lines.
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f14);
// Fog near/far are set per-track in frameCamera(): a 56 mm vase and a 4 m robot
// cell need wildly different absolute distances to look the same on screen.
scene.fog = new THREE.Fog(0x0b0f14, 1, 2);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.5, 8000);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.75;
controls.zoomSpeed = 0.9;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

const root = new THREE.Group();
scene.add(root);

// Lights — the toolpath is unlit lines, but the machine model uses standard
// materials that need lighting to read as solid metal/plastic on the black bg.
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
scene.add(new THREE.HemisphereLight(0xdce8f6, 0x1a1f27, 1.5));
const keyLight = new THREE.DirectionalLight(0xffffff, 2.4);
keyLight.position.set(0.7, 1.2, 0.8);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xbcd0e8, 0.7);
fillLight.position.set(-0.8, 0.5, -0.7);
scene.add(fillLight);

// ===========================================================================
// 2b. Machine — a representative model of the rail-mounted robot printer, sized
// to the object. The arm's nozzle tracks the current print point (2-link inverse
// kinematics in the X-Z plane; the carriage rides the rail in Y) so it looks
// like the robot is actually laying down the part.
// ===========================================================================

const MAT_BED   = new THREE.MeshStandardMaterial({ color: 0xf4f6f8, roughness: 0.92, metalness: 0.02 });
const MAT_HEAT  = new THREE.MeshStandardMaterial({ color: 0xd2d7dd, roughness: 0.5,  metalness: 0.35 });
const MAT_FRAME = new THREE.MeshStandardMaterial({ color: 0xb8bfc8, roughness: 0.6,  metalness: 0.25 });
const MAT_SEAM  = new THREE.MeshStandardMaterial({ color: 0x8b929c, roughness: 0.6,  metalness: 0.2  });
const MAT_RAIL  = new THREE.MeshStandardMaterial({ color: 0xe8ebee, roughness: 0.6,  metalness: 0.2  });
const MAT_ARM   = new THREE.MeshStandardMaterial({ color: 0x3a3f48, roughness: 0.45, metalness: 0.6  });
const MAT_ARM2  = new THREE.MeshStandardMaterial({ color: 0x24272e, roughness: 0.5,  metalness: 0.55 });
const MAT_ARM3  = new THREE.MeshStandardMaterial({ color: 0x565c66, roughness: 0.4,  metalness: 0.65 });
const MAT_WHT   = new THREE.MeshStandardMaterial({ color: 0xeef1f5, roughness: 0.5,  metalness: 0.15 });
const MAT_TIP   = new THREE.MeshStandardMaterial({ color: 0x3a3f47, roughness: 0.35, metalness: 0.8  });

const _UP = new THREE.Vector3(0, 1, 0);
const _dir = new THREE.Vector3();

/** Position/scale a unit-height (along local Y) cylinder mesh to span A→B. */
function spanCyl(mesh, ax, ay, az, bx, by, bz) {
  mesh.position.set((ax + bx) / 2, (ay + by) / 2, (az + bz) / 2);
  _dir.set(bx - ax, by - ay, bz - az);
  const len = _dir.length() || 1e-6;
  mesh.scale.set(1, len, 1);
  mesh.quaternion.setFromUnitVectors(_UP, _dir.multiplyScalar(1 / len));
}

class Machine {
  constructor(bbox) {
    // 1. Find the exact center of the printed object from its G-code bounding box
    const [objMinX, objMinY, objMinZ, objMaxX, objMaxY, objMaxZ] = bbox;
    const objCX = (objMinX + objMaxX) / 2;
    const objCY = (objMinY + objMaxY) / 2;
    
    // 2. Define the physical scale of the robot and bed (minimum envelope size in mm)
    // Adjust these numbers to match the Haddy printer's true physical scale!
    const baseScaleX = 1000; // Base width scale 
    const baseScaleY = 1600; // Base length scale
    const baseScaleZ = 1200; // Base height scale
    
    // 3. Ensure the machine envelope is always at least the size of the real-world scale
    const envelopeX = Math.max(baseScaleX, objMaxX - objMinX);
    const envelopeY = Math.max(baseScaleY, objMaxY - objMinY);
    const envelopeZ = Math.max(baseScaleZ, objMaxZ - objMinZ);
    
    // 4. Force the machine bounds to center perfectly around the object
    const minX = objCX - (envelopeX / 2);
    const maxX = objCX + (envelopeX / 2);
    const minY = objCY - (envelopeY / 2);
    const maxY = objCY + (envelopeY / 2);
    const maxZ = objMinZ + envelopeZ;
    const minZ = objMinZ;
    const floor = objMinZ;

    const extX = maxX - minX, extY = maxY - minY, extZ = maxZ - minZ;
    const cx = objCX, cy = objCY;
    this.group = new THREE.Group();
    this.cyRef = cy;

    const U = Math.max(extX, extZ);
    
    // DON'T FORGET THIS HELPER FUNCTION!
    const add = (geo, mat, x, y, z, parent) => {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      (parent || this.group).add(m);
      return m;
    };
  
    // ===== beds: heated (object side) + normal (perpendicular split) =====
    const stepH = 0.05 * extZ, slabT = 0.045 * extZ;
    const Zg = floor - 0.40 * extZ; 
    
    const bx0 = minX - 0.22 * extX, bx1 = maxX + 0.15 * extX;
    const bedW = bx1 - bx0, bedCX = (bx0 + bx1) / 2;
    const seamT = 0.006 * U, frameT = 0.02 * U;

    const bedLegs = (y0, y1, top) => {
      const insetX = 0.09 * bedW, insetY = 0.09 * (y1 - y0), legR = 0.026 * U;
      const legTop = top - slabT, legH = legTop - Zg;
      
      for (const X of [bx0 + insetX, bx1 - insetX])
        for (const Y of [y0 + insetY, (y0 + y1) / 2, y1 - insetY])
          add(new THREE.BoxGeometry(legR * 2, legR * 2, legH), MAT_FRAME, X, Y, legTop - legH / 2);
          
      for (const Y of [y0 + insetY, y1 - insetY])
        add(new THREE.BoxGeometry(bedW * 0.86, legR * 1.4, legR * 1.4), MAT_FRAME, bedCX, Y, Zg + legH * 0.2);
    };

    // heated bed
    const hy0 = minY - 0.2 * extY, hy1 = maxY + 0.2 * extY;
    const heatedD = hy1 - hy0, heatedCY = (hy0 + hy1) / 2;
    
    add(new THREE.BoxGeometry(bedW, heatedD, slabT), MAT_HEAT, bedCX, heatedCY, floor - slabT / 2);
    add(new THREE.BoxGeometry(bedW + 2 * frameT, heatedD + 2 * frameT, slabT * 0.55), MAT_FRAME, bedCX, heatedCY, floor - slabT - slabT * 0.15);
    for (let i = 1; i < 4; i++) add(new THREE.BoxGeometry(bedW * 0.95, seamT, seamT * 2.5), MAT_SEAM, bedCX, hy0 + heatedD * i / 4, floor + seamT);
    for (let i = 1; i < 3; i++) add(new THREE.BoxGeometry(seamT, heatedD * 0.95, seamT * 2.5), MAT_SEAM, bx0 + bedW * i / 3, heatedCY, floor + seamT);
    bedLegs(hy0, hy1, floor);

    // normal bed 
    const gap = 0.02 * extY;
    const ny0 = hy1 + gap;                  
    const ny1 = ny0 + 0.8 * extY;           
    const normD = ny1 - ny0, normCY = (ny0 + ny1) / 2, normTop = floor - stepH;
    
    add(new THREE.BoxGeometry(bedW, normD, slabT), MAT_BED, bedCX, normCY, normTop - slabT / 2);
    add(new THREE.BoxGeometry(bedW + 2 * frameT, normD + 2 * frameT, slabT * 0.55), MAT_FRAME, bedCX, normCY, normTop - slabT - slabT * 0.15);
    for (let i = 1; i < 4; i++) add(new THREE.BoxGeometry(bedW * 0.95, seamT, seamT * 2.5), MAT_SEAM, bedCX, ny0 + normD * i / 4, normTop + seamT);
    for (let i = 1; i < 3; i++) add(new THREE.BoxGeometry(seamT, normD * 0.95, seamT * 2.5), MAT_SEAM, bx0 + bedW * i / 3, normCY, normTop + seamT);
    bedLegs(ny0, ny1, normTop);

    // ===== linear rail =====
    const railX = maxX + 1.2 * extX;
    const railY0 = hy0 - 0.2 * extY, railY1 = ny1 + 0.2 * extY;
    const railLen = railY1 - railY0, railMidY = (railY0 + railY1) / 2;
    
    const gauge = 0.42 * extX, beamR = 0.022 * U, railZ = floor + 0.02 * extZ;
    for (const s of [-1, 1]) add(new THREE.BoxGeometry(beamR * 2.2, railLen, beamR * 3), MAT_RAIL, railX + s * gauge / 2, railMidY, railZ);
    const nRungs = Math.max(10, Math.round(railLen / (0.4 * extX)));
    for (let i = 0; i <= nRungs; i++) {
      const yy = railY0 + railLen * i / nRungs;
      add(new THREE.BoxGeometry(gauge, beamR * 1.5, beamR * 1.6), MAT_RAIL, railX, yy, railZ);
      if (i % 2 === 0) {
        const legTop = railZ - beamR, legH = legTop - Zg;
        for (const s of [-1, 1]) add(new THREE.BoxGeometry(beamR * 1.8, beamR * 1.8, legH), MAT_RAIL, railX + s * gauge / 2, yy, legTop - legH / 2);
      }
    }

    // ===== arm =====
    MAT_ARM.color.setHex(0x606672);    // Medium dark grey
    MAT_ARM2.color.setHex(0x40454f);   // Darker joints
    const MAT_MOTOR = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7, metalness: 0.8 }); // Black motors

    const headLen = 0.55 * extZ;   
    
    // UPDATE: Lowered Turret Column Height
    const colH = 0.35 * U; 
    const shoulderZ = railZ + 0.09 * extZ + colH;             
    
    // Recalculated reach so the lowered arm can still stretch over tall prints
    const maxReach = Math.hypot(railX - minX, maxZ - floor + headLen * 1.5);
    this.L1 = maxReach * 0.45; // Lengthened base link to compensate for lower start height
    this.L2 = maxReach * 0.80; 
    const armR = 0.035 * maxReach; // Skinnier arm                  

    this.railX = railX; this.shoulderZ = shoulderZ;
    this.armR = armR; this.headLen = headLen;
    this.railY0 = railY0 + 0.1 * railLen; this.railY1 = railY1 - 0.1 * railLen;

    // 1. Carriage
    const carriage = new THREE.Group();
    this.carriage = carriage;
    this.group.add(carriage);

    add(new THREE.BoxGeometry(gauge * 1.15, gauge * 1.2, 0.09 * extZ), MAT_ARM2, railX, cy, railZ + 0.045 * extZ, carriage);
    (add(new THREE.CylinderGeometry(armR * 1.2, armR * 1.2, gauge * 1.4, 20), MAT_MOTOR, railX, cy, railZ + 0.045 * extZ, carriage)).rotation.x = Math.PI / 2; // Rail motor

    // 2. Turret
    this.turret = new THREE.Group();
    this.turret.position.set(railX, cy, railZ + 0.09 * extZ);
    carriage.add(this.turret);

    // Turret gear base with teeth
    const ring = add(new THREE.CylinderGeometry(armR * 2.8, armR * 3.0, armR * 0.6, 32), MAT_ARM2, 0, 0, armR * 0.3, this.turret);
    ring.rotation.x = Math.PI / 2;
    for(let i=0; i<18; i++) {
      const a = (i/18) * Math.PI * 2;
      const tooth = add(new THREE.BoxGeometry(armR * 0.8, armR * 0.6, armR * 0.6), MAT_ARM2, Math.cos(a)*armR*2.9, Math.sin(a)*armR*2.9, armR * 0.3, this.turret);
      tooth.rotation.z = a;
    }

    add(new THREE.BoxGeometry(armR * 2.4, armR * 2.0, colH), MAT_ARM, 0, 0, colH / 2, this.turret);

    // Shoulder & Motors
    add(new THREE.CylinderGeometry(armR * 2.2, armR * 2.2, armR * 4.0, 24), MAT_ARM2, 0, 0, colH, this.turret);
    add(new THREE.BoxGeometry(armR * 4.0, armR * 2.2, armR * 4.0), MAT_ARM, -armR * 1.8, 0, colH, this.turret); // Heavy counterweight
    (add(new THREE.CylinderGeometry(armR * 1.6, armR * 1.6, armR * 5.0, 20), MAT_MOTOR, 0, 0, colH, this.turret)).rotation.x = Math.PI / 2; // Main shoulder servo

    // 3. Moving links
    this.baseArm = add(new THREE.CylinderGeometry(armR * 1.5, armR * 1.8, 1, 24), MAT_ARM, 0, 0, 0);
    this.elbowJ = add(new THREE.CylinderGeometry(armR * 1.6, armR * 1.6, armR * 3.2, 24), MAT_ARM2, 0, 0, 0);
    
    // Detailed Dual Lift Pistons
    this.pistonL = add(new THREE.CylinderGeometry(armR * 0.7, armR * 0.7, 1, 16), MAT_ARM2, 0, 0, 0);
    this.pistonR = add(new THREE.CylinderGeometry(armR * 0.7, armR * 0.7, 1, 16), MAT_ARM2, 0, 0, 0);

    this.mainArm = add(new THREE.CylinderGeometry(armR * 1.2, armR * 1.5, 1, 24), MAT_ARM, 0, 0, 0);
    this.strut = add(new THREE.CylinderGeometry(armR * 0.4, armR * 0.4, 1, 16), MAT_ARM3, 0, 0, 0);
    this.wristJ = add(new THREE.SphereGeometry(armR * 1.2, 18, 14), MAT_ARM2, 0, 0, 0);

    // 4. Detailed White Print Head
    const head = new THREE.Group(); this.head = head; this.group.add(head);
    const rH = 0.085 * (this.L2 * 0.65); 

    (add(new THREE.CylinderGeometry(rH * 0.75, rH * 0.3, headLen * 0.16, 16), MAT_TIP, 0, 0, headLen * 0.08, head)).rotation.x = Math.PI / 2;    // nozzle
    (add(new THREE.CylinderGeometry(rH * 1.12, rH * 1.12, headLen * 0.06, 22), MAT_ARM3, 0, 0, headLen * 0.24, head)).rotation.x = Math.PI / 2;    // collar
    for (let i = 0; i < 5; i++) add(new THREE.BoxGeometry(rH * 0.95, rH * 1.5, headLen * 0.02), MAT_ARM2, 0, 0, headLen * 0.35 + (i * headLen * 0.06), head); // heat sink
    add(new THREE.BoxGeometry(rH * 0.8, rH * 1.4, headLen * 2.55), MAT_WHT, 0, 0, headLen * 1.4, head); // 3x taller skinny body
    add(new THREE.BoxGeometry(rH * 0.7, rH * 0.2, rH * 0.7), MAT_ARM3, 0, -rH * 0.8, headLen * 0.6, head); // fan block
    (add(new THREE.CylinderGeometry(rH * 0.3, rH * 0.3, rH * 0.22, 12), MAT_ARM2, 0, -rH * 0.8, headLen * 0.6, head)).rotation.x = Math.PI / 2; // fan hub
    
    // Image-Accurate Pellet Hopper Assembly
    const bracket = add(new THREE.BoxGeometry(rH * 0.4, rH * 0.4, headLen * 0.8), MAT_WHT, rH * 1.2, 0, headLen * 2.2, head);
    bracket.rotation.y = Math.PI / 4; // Angled mount
    (add(new THREE.CylinderGeometry(rH * 1.6, rH * 1.6, headLen * 0.7, 24), MAT_WHT, rH * 1.8, 0, headLen * 2.7, head)).rotation.x = Math.PI / 2; // Hopper body
    (add(new THREE.CylinderGeometry(rH * 1.6, rH * 0.4, headLen * 0.3, 24), MAT_WHT, rH * 1.8, 0, headLen * 2.2, head)).rotation.x = Math.PI / 2; // Hopper cone funnel
    (add(new THREE.CylinderGeometry(rH * 1.7, rH * 1.7, headLen * 0.1, 24), MAT_ARM3, rH * 1.8, 0, headLen * 3.1, head)).rotation.x = Math.PI / 2; // Hopper cap lid

    add(new THREE.BoxGeometry(rH * 0.8, rH * 1.0, rH * 1.2), MAT_ARM3, rH * 0.8, 0, headLen * 1.0, head); // gear housing

    this.update(cx, cy, maxZ);
  }

  update(tx, ty, tz) {
    const wx = tx, wy = ty, wz = tz + this.headLen;
    const sx = this.railX, sz = this.shoulderZ;

    let cyc = this.cyRef + (wy - this.cyRef) * 0.6;
    cyc = Math.min(this.railY1, Math.max(this.railY0, cyc));
    this.carriage.position.y = cyc - this.cyRef;

    const dx = wx - sx;
    const dy = wy - cyc;
    const dist_xy = Math.hypot(dx, dy);

    const yaw = Math.atan2(dy, dx);
    this.turret.rotation.z = yaw; 

    const delta_r = dist_xy;
    const delta_z = wz - sz;
    const d = Math.hypot(delta_r, delta_z) || 1e-6;
    const L1 = this.L1, L2 = this.L2;

    let ej_r, ej_z, end_r = delta_r, end_z = wz;

    if (d >= L1 + L2) {
      const a = Math.atan2(delta_z, delta_r);
      ej_r = L1 * Math.cos(a);
      ej_z = sz + L1 * Math.sin(a);
      end_r = (L1 + L2) * Math.cos(a);
      end_z = sz + (L1 + L2) * Math.sin(a);
    } else {
      let c = (L1 * L1 + d * d - L2 * L2) / (2 * L1 * d);
      c = Math.max(-1, Math.min(1, c));
      const a = Math.atan2(delta_z, delta_r);
      const th1 = a + Math.acos(c); 
      ej_r = L1 * Math.cos(th1);
      ej_z = sz + L1 * Math.sin(th1);
    }

    const ex = sx + ej_r * Math.cos(yaw);
    const ey = cyc + ej_r * Math.sin(yaw);
    const ez = ej_z;

    const rx = sx + end_r * Math.cos(yaw);
    const ry = cyc + end_r * Math.sin(yaw);
    const rz = end_z;

    this.head.position.set(wx, wy, tz);
    this.wristJ.position.set(rx, ry, rz);
    this.elbowJ.position.set(ex, ey, ez);

    this.elbowJ.quaternion.setFromUnitVectors(
      new THREE.Vector3(0, 1, 0),
      new THREE.Vector3(-Math.sin(yaw), Math.cos(yaw), 0)
    );

    spanCyl(this.baseArm, sx, cyc, sz, ex, ey, ez);
    spanCyl(this.mainArm, ex, ey, ez, rx, ry, rz);
    
    const upOffset = this.armR * 1.6; 
    spanCyl(this.strut, ex, ey, ez + upOffset, rx, ry, rz + upOffset);

    const pOffsetX = -Math.sin(yaw) * (this.armR * 1.6);
    const pOffsetY = Math.cos(yaw) * (this.armR * 1.6);
    const pOffsetZ = -this.armR * 0.8; 

    spanCyl(this.pistonL, sx + pOffsetX, cyc + pOffsetY, sz + pOffsetZ, ex + pOffsetX, ey + pOffsetY, ez + pOffsetZ);
    spanCyl(this.pistonR, sx - pOffsetX, cyc - pOffsetY, sz + pOffsetZ, ex - pOffsetX, ey - pOffsetY, ez + pOffsetZ);
  }
}

// ===========================================================================
// 3. Track — one machine program, rendered and scrubbable
// ===========================================================================

class Track {
  constructor(data) {
    this.data = data;
    this.group = new THREE.Group();

    // All the buffer/prefix-sum work lives in viewer-core.js so it can be
    // unit-tested in Node without a GPU.
    this.buffers = buildTrackBuffers(data);
    const { mainPos, mainCol, travPos, segCount } = this.buffers;
    this.segCount = segCount;

    // Frame and scale against the deposited object, not the machine envelope —
    // otherwise one park move at Z 400 pushes the object into the distance.
    const bbox = this.buffers.contentBbox;

    const posAttr = new THREE.BufferAttribute(mainPos, 3);
    const colAttr = new THREE.BufferAttribute(mainCol, 3);

    // Two geometries sharing one pair of GPU buffers. The "cold" one draws
    // everything up to the current layer; the "hot" one draws only the current
    // layer, brighter. No duplicated memory, no per-frame copying.
    const coldGeo = new THREE.BufferGeometry();
    coldGeo.setAttribute('position', posAttr);
    coldGeo.setAttribute('color', colAttr);

    const hotGeo = new THREE.BufferGeometry();
    hotGeo.setAttribute('position', posAttr);
    hotGeo.setAttribute('color', colAttr);

    const travGeo = new THREE.BufferGeometry();
    travGeo.setAttribute('position', new THREE.BufferAttribute(travPos, 3));

    this.cold = new THREE.LineSegments(coldGeo, new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.9, linewidth: 2
    }));
    this.hot = new THREE.LineSegments(hotGeo, new THREE.LineBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 1.0, depthWrite: false, linewidth: 3
    }));
    this.travel = new THREE.LineSegments(travGeo, new THREE.LineBasicMaterial({
      color: 0x64748b, transparent: true, opacity: 0.28, depthWrite: false
    }));
    this.travel.visible = false;

    const span = Math.max(bbox[3]-bbox[0], bbox[4]-bbox[1], bbox[5]-bbox[2]);
    this.head = new THREE.Mesh(
      new THREE.SphereGeometry(span * 0.011, 16, 12),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );

    this.group.add(this.cold, this.hot, this.travel, this.head);

    // The rail-mounted robot printer, sized to this object. Its nozzle tracks
    // the current print point (updated from setProgress).
    this.machine = new Machine(bbox);
    this.group.add(this.machine.group);

    // Machine data is Z-up, three.js is Y-up. Rotate the whole group once
    // rather than swizzling every vertex: (x, y, z) -> (x, z, -y).
    this.group.rotation.x = -Math.PI / 2;

    this.center = new THREE.Vector3((bbox[0]+bbox[3])/2, (bbox[1]+bbox[4])/2, (bbox[2]+bbox[5])/2);
    this.span = span;
    this.layerCount = data.layerZ.length;
  }

  /** Show the toolpath up to segment `s`. Hot loop — three setDrawRange calls,
      no geometry rebuild and no buffer upload, so it stays smooth while a
      finger is dragging the slider. */
  setProgress(s) {
    const r = drawRangesFor(this.buffers, this.data, s);
    this.current = r.seg;

    this.cold.geometry.setDrawRange(r.cold.start, r.cold.count);
    this.hot.geometry.setDrawRange(r.hot.start, r.hot.count);
    this.travel.geometry.setDrawRange(r.travel.start, r.travel.count);

    const p = this.data.pts;
    const hx = p[r.seg * 3], hy = p[r.seg * 3 + 1], hz = p[r.seg * 3 + 2];
    this.head.position.set(hx, hy, hz);
    this.head.visible = r.seg > 0;
    this.machine.update(hx, hy, hz);

    return r.layer;
  }

  dispose() {
    this.group.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
  }
}

// ===========================================================================
// 4. App state + UI
// ===========================================================================

const el = {
  title: document.getElementById('title'),
  subtitle: document.getElementById('subtitle'),
  tracks: document.getElementById('tracks'),
  play: document.getElementById('play'),
  scrub: document.getElementById('scrub'),
  layerNo: document.getElementById('layerNo'),
  zTxt: document.getElementById('zTxt'),
  veil: document.getElementById('veil'),
  veilTxt: document.getElementById('veilTxt'),
  hint: document.getElementById('hint'),
  btnHome: document.getElementById('btnHome'),
  btnTravel: document.getElementById('btnTravel'),
  btnLock: document.getElementById('btnLock'),
  nextDemo: document.getElementById('nextDemo'),
};

const params = new URLSearchParams(location.search);
const state = {
  tracks: [], active: null,
  playing: false, progress: 0,
  duration: 14,          // seconds for a full pass
  attract: true,         // loop until a human touches something
  showTravel: false,
};

function setVeil(msg, isError = false) {
  el.veil.classList.toggle('error', isError);
  el.veilTxt.textContent = msg;
  el.veil.classList.remove('gone');
}
function hideVeil() { el.veil.classList.add('gone'); }

/** Frame the object and rescale every distance-based setting to its size. */
function frameCamera(track) {
  const d = track.span * 2.5;   // zoomed out enough to include the arm + rail
  // The group is rotated -90 deg about X, so machine (x, y, z) lands at
  // world (x, z, -y). Convert the centre the same way, raised toward the arm.
  const target = new THREE.Vector3(track.center.x, track.center.z + track.span * 0.1, -track.center.y);

  controls.target.copy(target);
  camera.position.set(target.x + d * 0.74, target.y + d * 0.5, target.z + d * 0.74);
  camera.near = Math.max(track.span / 500, 0.01);
  camera.far = track.span * 80;
  camera.updateProjectionMatrix();

  controls.minDistance = track.span * 0.12;
  controls.maxDistance = track.span * 16;
  // Fog only fades the far ends of the rail — keep it well behind the machine so
  // the white bed and rail don't get darkened.
  scene.fog.near = d * 1.9;
  scene.fog.far = d * 10;

  controls.update();
}

function selectTrack(i) {
  if (state.active === state.tracks[i]) return;
  for (const t of state.tracks) root.remove(t.group);
  state.active = state.tracks[i];
  root.add(state.active.group);
  state.active.travel.visible = state.showTravel;
  frameCamera(state.active);
  setProgress(state.progress);
  [...el.tracks.children].forEach((c, j) => c.setAttribute('aria-selected', String(j === i)));
}

function setProgress(p) {
  state.progress = Math.max(0, Math.min(1, p));
  const t = state.active;
  if (!t) return;
  const layer = t.setProgress(state.progress * t.segCount);
  el.scrub.value = String(Math.round(state.progress * 1000));
  el.scrub.style.setProperty('--pct', (state.progress * 100).toFixed(1) + '%');
  el.layerNo.innerHTML = `${layer + 1} <small>/ ${t.layerCount} layers</small>`;
  el.zTxt.textContent = `Z ${t.data.layerZ[layer].toFixed(2)} mm`;
}

function setPlaying(on) {
  state.playing = on;
  el.play.textContent = on ? '❚❚' : '▶';
  el.play.setAttribute('aria-label', on ? 'Pause' : 'Play');
}

/** Any deliberate touch ends attract mode, so the piece stops looping at them. */
function userTookOver() {
  if (!state.attract) return;
  state.attract = false;
  el.hint.classList.add('gone');
}

el.play.addEventListener('click', () => {
  userTookOver();
  if (!state.playing && state.progress >= 0.999) state.progress = 0;
  setPlaying(!state.playing);
});

el.scrub.addEventListener('input', () => {
  userTookOver();
  setPlaying(false);
  setProgress(+el.scrub.value / 1000);
});

el.btnHome.addEventListener('click', () => {
  userTookOver();
  if (state.active) frameCamera(state.active);
});

el.btnTravel.addEventListener('click', () => {
  userTookOver();
  state.showTravel = !state.showTravel;
  el.btnTravel.setAttribute('aria-pressed', String(state.showTravel));
  if (state.active) state.active.travel.visible = state.showTravel;
});

controls.addEventListener('start', userTookOver);

// Lock: clear the server session cookie and return to the access screen.
if (el.btnLock) el.btnLock.addEventListener('click', () => { location.assign('/api/logout'); });

/** Show the "Next demo" control and point it at the following exhibit. The auth
    cookie carries across the navigation, so there's no re-login between demos. */
function setupDemoNav(ids, currentId) {
  if (!el.nextDemo || ids.length < 2) return;
  const nextId = ids[(ids.indexOf(currentId) + 1) % ids.length];
  el.nextDemo.classList.remove('hidden');
  el.nextDemo.addEventListener('click', () => {
    const u = new URL(location.href);
    u.searchParams.set('p', nextId);
    u.searchParams.delete('id');
    location.assign(u.toString());
  });
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Pause the render loop when the tab is hidden — battery matters when the page
// might sit open in someone's pocket for an hour.
let visible = true;
document.addEventListener('visibilitychange', () => { visible = !document.hidden; });

// ===========================================================================
// 5. Boot
// ===========================================================================

async function boot() {
  try {
    let title = 'Toolpath', subtitle = '', files = [];

    const src = params.get('src');
    if (src) {
      files = [{ name: 'source', file: src }];
      title = params.get('title') || 'Toolpath';
    } else {
      setVeil('Loading…');
      const mres = await fetch('data/manifest.json');
      if (!mres.ok) {
        // Worth a clear message: this is the failure you get from deploying
        // without running build_toolpath.py, and "unexpected token <" would
        // send you looking in the wrong place.
        throw new Error(`Could not load data/manifest.json (${mres.status}). ` +
                        `Run tools/build_toolpath.py to generate it.`);
      }
      const manifest = await mres.json();
      const ids = Object.keys(manifest.exhibits || {});
      if (!ids.length) throw new Error('manifest.json has no exhibits.');
      const id = params.get('p') || params.get('id') || ids[0];
      const ex = manifest.exhibits[id];
      if (!ex) throw new Error(`No exhibit "${id}" in manifest.json.`);
      title = ex.title || id;
      subtitle = ex.subtitle || '';
      files = ex.tracks.map(t => ({ ...t, file: 'data/' + t.file }));
      setupDemoNav(ids, id);
    }

    el.title.textContent = title;
    el.subtitle.textContent = subtitle;
    document.title = title;

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      const label = files.length > 1 ? ` (${i + 1}/${files.length})` : '';
      const data = await loadTrack(f.file, pct => {
        setVeil(`Loading${label} ${Math.round(pct * 100)}%`);
      });
      setVeil(`Building${label}…`);
      await new Promise(r => setTimeout(r, 30));   // let the veil repaint (setTimeout,
      // not rAF, so a backgrounded tab during load can't hang on "Building…")
      state.tracks.push(new Track(data));
    }

    if (files.length > 1) {
      files.forEach((f, i) => {
        const b = document.createElement('button');
        b.className = 'chip';
        b.setAttribute('role', 'tab');
        b.textContent = f.name || `Track ${i + 1}`;
        b.addEventListener('click', () => { userTookOver(); selectTrack(i); });
        el.tracks.appendChild(b);
      });
    }

    selectTrack(0);
    setProgress(0);
    hideVeil();
    setPlaying(true);
    setTimeout(() => el.hint.classList.remove('gone'), 900);
    setTimeout(() => el.hint.classList.add('gone'), 6500);

  } catch (err) {
    console.error(err);
    setVeil(String(err.message || err), true);
  }
}

// ===========================================================================
// 6. Render loop
// ===========================================================================

let last = performance.now();
renderer.setAnimationLoop(() => {
  const now = performance.now();
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;

  if (!visible) return;

  if (state.playing && state.active) {
    let p = state.progress + dt / state.duration;
    if (p >= 1) {
      if (state.attract) {
        p = 0;                    // loop for passers-by
      } else {
        p = 1;
        setPlaying(false);
      }
    }
    setProgress(p);
  }

  controls.update();
  renderer.render(scene, camera);
});

// ===========================================================================
// 7. Boot. Access is enforced server-side (functions/_middleware.js) before this
// page is served, so we just start the viewer.
// ===========================================================================

boot();
</script>
</body>
</html>
